name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run tests
        run: python -m unittest discover -s local/tests -p "test_*.py"

  build-skill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build skill
        shell: pwsh
        run: ./tools/Build-Skill.ps1
      - name: Verify .skill archive
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::OpenRead((Resolve-Path './dist/desktop-env-backup.skill'))
          $names = $zip.Entries | ForEach-Object { $_.FullName }
          $zip.Dispose()
          $names
          if ($names -match '\\') { throw "Backslash separator in .skill archive" }
          foreach ($e in @('SKILL.md','local/claude_backup.py','local/claude_restore.py','local/paths.py','local/vault.py')) {
            if ($names -notcontains $e) { throw "Missing entry: $e" }
          }
          Write-Host "Archive .skill OK"
      - name: Verify version consistency
        shell: pwsh
        run: |
          $v = (Get-Content ./VERSION -Raw).Trim()
          $pattern = "badge/version-" + [regex]::Escape($v) + "-"
          if (-not (Select-String -Path ./README.md -Pattern $pattern)) {
            throw "README badge does not match VERSION ($v)"
          }
          Write-Host "Version consistent: $v"
